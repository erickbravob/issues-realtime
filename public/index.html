<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Notificaciones de Infraestructura</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 30px;
        }

        h1 {
            color: #1f2937;
        }

        .estado {
            padding: 10px;
            background: #e0f2fe;
            border-left: 5px solid #0284c7;
            margin-bottom: 20px;
        }

        .notificacion {
            background: white;
            border-left: 5px solid #16a34a;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }

        .titulo {
            font-weight: bold;
            color: #111827;
        }

        .detalle {
            color: #374151;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>Panel de Notificaciones en Tiempo Real</h1>

    <div class="estado" id="estado">
        Conectando con Socket.IO...
    </div>

    <div id="notificaciones"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>

</body>
</html>
