AWSTemplateFormatVersion: '2010-09-09'
Description: 'Sistema de almacenamiento con S3 y registro de accesos'

Parameters:
  Ambiente:
    Type: String
    Default: desarrollo
    AllowedValues:
      - desarrollo
      - staging
      - produccion
    Description: 'Ambiente de despliegue'

Resources:
  BucketPrincipal:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'datos-${Ambiente}'
      VersioningConfiguration:
        Status: Enabled

  BucketLogs:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'logs-${Ambiente}'

Outputs:
  BucketPrincipalNombre:
    Value: !Ref BucketPrincipal
    Description: 'Bucket principal de datos'

  BucketLogsNombre:
    Value: !Ref BucketLogs
    Description: 'Bucket de logs'